<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Box 1: Your AI system -->
  <rect x="40" y="60" width="160" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="120" y="94" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Your AI system</text>
  <text x="120" y="114" text-anchor="middle" font-size="12" fill="#5F5E5A">Any AI use case</text>
  <text x="120" y="129" text-anchor="middle" font-size="12" fill="#5F5E5A">or deployment</text>

  <!-- Arrow 1 -->
  <line x1="202" y1="100" x2="240" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2: Governance assessment -->
  <rect x="242" y="60" width="196" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Governance assessment</text>
  <text x="340" y="110" text-anchor="middle" font-size="12" fill="#633806">5 pillars, weighted</text>
  <text x="340" y="126" text-anchor="middle" font-size="12" fill="#633806">controls, scored output</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="100" x2="478" y2="100" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3: Risk profile -->
  <rect x="480" y="60" width="160" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Risk profile</text>
  <text x="560" y="110" text-anchor="middle" font-size="12" fill="#0F6E56">Score, gaps ranked</text>
  <text x="560" y="126" text-anchor="middle" font-size="12" fill="#0F6E56">by severity</text>

  <!-- Step labels -->
  <text x="120" y="168" text-anchor="middle" font-size="12" fill="#888780">Step 1. Select AI system</text>
  <text x="340" y="168" text-anchor="middle" font-size="12" fill="#888780">Step 2. Complete assessment</text>
  <text x="560" y="168" text-anchor="middle" font-size="12" fill="#888780">Step 3. Act on findings</text>

</svg>
